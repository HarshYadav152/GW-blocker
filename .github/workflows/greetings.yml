name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          issue-message: |
            👋 **Welcome @${{ github.actor }} to GW-blocker!**

            Thanks for opening your first issue — we appreciate your help improving the project.

            Before a maintainer reviews this issue, please ensure it includes:
            - ✔️ Clear description of the problem
            - ✔️ Steps to reproduce (for bugs)
            - ✔️ Expected vs actual behavior
            - ✔️ Screenshots/logs (if applicable)
            - ✔️ Environment details (OS, Python version, installation method)

            📘 **Contribution Guide:**
            👉 https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md

            A maintainer will review your issue soon.
            Happy contributing! 🚀

          pr-message: |
            🎉 **Thank you @${{ github.actor }} for your first PR to GW-blocker!**

            We appreciate your contribution and the time you invested.

            What happens next:
            - 🔍 Maintainers will review your PR
            - 🧪 Automated checks will run
            - ✨ Feedback may be shared if needed

            Please confirm your PR includes:
            - ✔️ Clear summary of changes
            - ✔️ Linked issue (when available)
            - ✔️ Steps to test
            - ✔️ Screenshots for UI changes

            📘 **Contribution Standards:**
            👉 https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md

            Thanks for helping improve GW-blocker!
